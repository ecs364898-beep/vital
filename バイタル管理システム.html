<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バイタル管理システム v4</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0f2744;
  --teal: #0d7a8a;
  --teal-light: #e0f4f7;
  --teal-mid: #b2e4ea;
  --amber: #e67e22;
  --amber-light: #fef3e2;
  --purple: #6c3483;
  --purple-light: #f3e9f8;
  --green: #1e8449;
  --green-light: #e8f5e9;
  --red: #c0392b;
  --red-light: #fce8e6;
  --yellow: #f9ca24;
  --yellow-light: #fffde7;
  --gray-50: #f8fafc;
  --gray-100: #f1f5f9;
  --gray-200: #e2e8f0;
  --gray-300: #cbd5e1;
  --gray-400: #94a3b8;
  --gray-500: #64748b;
  --gray-600: #475569;
  --gray-700: #334155;
  --gray-800: #1e293b;
  --white: #ffffff;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,.1),0 2px 4px rgba(0,0,0,.06);
  --shadow-lg: 0 10px 30px rgba(0,0,0,.12),0 4px 8px rgba(0,0,0,.08);
  --radius: 10px;
  --font: 'Noto Sans JP', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body { font-family:var(--font); background:var(--gray-50); color:var(--gray-800); font-size:13px; }

/* ── LAYOUT ── */
.app { display:grid; grid-template-rows:54px 1fr; height:100vh; }

/* ── TOPBAR ── */
.topbar {
  background: linear-gradient(135deg, var(--navy) 0%, #1a3a5c 100%);
  display:flex; align-items:center; gap:16px; padding:0 20px;
  box-shadow: var(--shadow-md); z-index:100; position:relative;
}
.topbar-logo { color:var(--white); font-size:15px; font-weight:700; letter-spacing:-.3px; white-space:nowrap; }
.topbar-logo span { color:var(--teal-mid); }
.topbar-date {
  margin-left:auto; color:rgba(255,255,255,.7); font-size:12px; font-family:var(--mono);
  background:rgba(255,255,255,.07); padding:4px 10px; border-radius:5px;
}
.alert-banner {
  background:rgba(192,57,43,.9); color:var(--white); font-size:11px; font-weight:500;
  padding:3px 10px; border-radius:4px; animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.7} }

/* ── SHEET TABS ── */
.tabs-bar {
  display:flex; align-items:stretch; gap:2px; padding:0 20px;
  background:var(--navy); border-bottom:2px solid var(--teal);
  overflow-x:auto; white-space:nowrap;
}
.tab {
  padding:8px 16px; font-size:12px; font-weight:500; color:rgba(255,255,255,.55);
  cursor:pointer; border:none; background:none; border-bottom:3px solid transparent;
  transition:all .15s; display:flex; align-items:center; gap:6px; white-space:nowrap;
}
.tab:hover { color:rgba(255,255,255,.85); background:rgba(255,255,255,.06); }
.tab.active { color:var(--white); border-bottom-color:var(--teal-mid); background:rgba(255,255,255,.08); }
.tab-icon { font-size:14px; }

/* ── MAIN CONTENT ── */
.main { display:grid; grid-template-rows:auto 1fr; overflow:hidden; }
.sheet-content { overflow:auto; padding:16px 20px 20px; }

/* ── SHEET TOOLBAR ── */
.sheet-toolbar {
  display:flex; align-items:center; gap:10px; padding:8px 20px;
  background:var(--white); border-bottom:1px solid var(--gray-200); flex-wrap:wrap;
}
.toolbar-title { font-size:13px; font-weight:700; color:var(--navy); }
.toolbar-divider { width:1px; height:20px; background:var(--gray-200); }
.toolbar-info { font-size:11px; color:var(--gray-500); font-family:var(--mono); }

/* ── BUTTONS ── */
.btn {
  display:inline-flex; align-items:center; gap:5px; padding:5px 12px;
  border-radius:6px; font-size:12px; font-weight:500; cursor:pointer;
  border:none; font-family:var(--font); transition:all .12s;
}
.btn-primary { background:var(--teal); color:var(--white); }
.btn-primary:hover { background:#0a6a78; }
.btn-secondary { background:var(--gray-100); color:var(--gray-700); border:1px solid var(--gray-200); }
.btn-secondary:hover { background:var(--gray-200); }
.btn-danger { background:var(--red-light); color:var(--red); border:1px solid #f5b7b1; }
.btn-danger:hover { background:#f5b7b1; }
.btn-amber { background:var(--amber-light); color:var(--amber); border:1px solid #f0c27a; }

/* ── TABLE BASE ── */
.tbl-wrap { overflow:auto; border-radius:var(--radius); box-shadow:var(--shadow-sm); border:1px solid var(--gray-200); }
table { border-collapse:collapse; width:100%; min-width:max-content; }
thead th {
  background:var(--navy); color:var(--white); padding:8px 12px; font-size:11px; font-weight:600;
  white-space:nowrap; text-align:center; border-right:1px solid rgba(255,255,255,.12);
  position:sticky; top:0; z-index:10;
}
thead th.th-teal { background:var(--teal); }
thead th.th-amber { background:var(--amber); }
thead th.th-purple { background:var(--purple); }
thead th.th-green { background:var(--green); }
thead th.th-red { background:var(--red); }
tbody tr:nth-child(even) { background:var(--gray-50); }
tbody tr:hover { background:var(--teal-light); }
tbody td {
  padding:6px 10px; border-bottom:1px solid var(--gray-100);
  border-right:1px solid var(--gray-100); font-size:12px; text-align:center;
  white-space:nowrap;
}
tbody td.td-name { text-align:left; font-weight:500; color:var(--navy); }
tbody td.td-id { font-family:var(--mono); font-size:11px; color:var(--gray-500); }
tbody td.td-bp { font-family:var(--mono); font-weight:600; }
tbody td.td-note { text-align:left; font-size:11px; color:var(--gray-600); max-width:180px; white-space:normal; }

/* ── STATUS BADGES ── */
.badge {
  display:inline-flex; align-items:center; gap:3px; padding:2px 8px;
  border-radius:20px; font-size:10px; font-weight:700; white-space:nowrap;
}
.badge-ok { background:var(--green-light); color:var(--green); }
.badge-alert { background:var(--red-light); color:var(--red); animation: pulse 2s infinite; }
.badge-warn { background:var(--yellow-light); color:#c57a00; }
.badge-pending { background:var(--gray-100); color:var(--gray-500); }
.badge-done { background:var(--green-light); color:var(--green); }
.badge-am { background:var(--amber-light); color:var(--amber); }
.badge-pm { background:var(--purple-light); color:var(--purple); }

/* ── INPUT ── */
input[type=text], input[type=number], select, textarea {
  font-family:var(--font); font-size:12px; border:1px solid var(--gray-300);
  border-radius:5px; padding:4px 8px; outline:none; width:100%;
  transition:border .12s;
}
input:focus, select:focus { border-color:var(--teal); box-shadow:0 0 0 3px rgba(13,122,138,.1); }
input.bp-input { text-align:center; font-family:var(--mono); font-weight:600; width:68px; }
input.bp-input:focus { border-color:var(--teal); }
input.bp-alert { border-color:var(--red); background:var(--red-light); }

/* ── CARDS ── */
.cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:12px; margin-bottom:16px; }
.card {
  background:var(--white); border-radius:var(--radius); padding:14px 16px;
  box-shadow:var(--shadow-sm); border:1px solid var(--gray-200);
  display:flex; flex-direction:column; gap:4px;
}
.card-label { font-size:10px; font-weight:600; color:var(--gray-400); text-transform:uppercase; letter-spacing:.5px; }
.card-value { font-size:22px; font-weight:700; color:var(--navy); line-height:1.1; }
.card-sub { font-size:11px; color:var(--gray-500); }
.card.card-alert { border-color:#f5b7b1; background:var(--red-light); }
.card.card-alert .card-value { color:var(--red); }
.card.card-teal { border-left:4px solid var(--teal); }
.card.card-amber { border-left:4px solid var(--amber); }
.card.card-green { border-left:4px solid var(--green); }
.card.card-red { border-left:4px solid var(--red); }

/* ── SECTION HEADERS ── */
.sec-head {
  display:flex; align-items:center; gap:10px; padding:10px 14px;
  border-radius:8px 8px 0 0; margin-bottom:0; font-weight:700; font-size:13px; color:var(--white);
}
.sec-head.am { background:linear-gradient(90deg,#c0550a,var(--amber)); }
.sec-head.pm { background:linear-gradient(90deg,#4a1a72,var(--purple)); }
.sec-head.teal { background:linear-gradient(90deg,#075a68,var(--teal)); }
.sec-head.navy { background:linear-gradient(90deg,#0a1c30,var(--navy)); }
.sec-wrap { margin-bottom:20px; border-radius:8px; overflow:hidden; box-shadow:var(--shadow-md); }

/* ── LEGEND ── */
.legend { display:flex; gap:8px; flex-wrap:wrap; }
.legend-item { display:flex; align-items:center; gap:4px; font-size:10px; color:var(--gray-600); }
.legend-dot { width:8px; height:8px; border-radius:50%; }

/* ── SCHEDULE GRID ── */
.schedule-grid { display:grid; grid-template-columns:48px repeat(5,1fr); gap:0; border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow-md); }
.sg-header { background:var(--navy); color:var(--white); font-size:11px; font-weight:700; padding:8px; text-align:center; }
.sg-day { padding:10px 4px; background:var(--gray-50); }
.sg-day-header { font-size:10px; font-weight:700; text-align:center; padding:6px; border-bottom:1px solid var(--gray-200); }
.sg-am { background:#fff8f2; }
.sg-pm { background:#faf5ff; }
.sg-name { font-size:11px; padding:3px 8px; border-bottom:1px solid var(--gray-100); text-align:center; }
.sg-seq { background:var(--navy); color:var(--white); font-size:11px; font-weight:700; padding:4px; text-align:center; border-bottom:1px solid rgba(255,255,255,.1); }
.day-cols { display:grid; grid-template-columns:1fr 1fr; }
.day-col-head { font-size:9px; font-weight:700; text-align:center; padding:4px; border-bottom:1px solid var(--gray-200); }
.day-col-head.am { background:var(--amber-light); color:var(--amber); }
.day-col-head.pm { background:var(--purple-light); color:var(--purple); }

/* ── PERSONAL CHART ── */
.chart-container { background:var(--white); border-radius:var(--radius); padding:16px; box-shadow:var(--shadow-sm); border:1px solid var(--gray-200); }
.chart-bars { display:flex; align-items:flex-end; gap:6px; height:120px; margin:8px 0 4px; }
.chart-bar-group { display:flex; gap:2px; align-items:flex-end; flex:1; }
.bar { border-radius:3px 3px 0 0; min-width:10px; cursor:pointer; transition:opacity .1s; }
.bar:hover { opacity:.8; }
.bar-sbp { background:var(--teal); }
.bar-dbp { background:var(--teal-mid); }
.bar-alert-sbp { background:var(--red); }
.bar-alert-dbp { background:#f1948a; }
.chart-label { font-size:9px; color:var(--gray-400); text-align:center; margin-top:2px; }
.chart-ref-line { position:relative; }
.chart-ref-line::before {
  content:'180'; position:absolute; right:-28px; top:0;
  font-size:9px; color:var(--red); font-family:var(--mono);
}

/* ── MODAL / TOAST ── */
.toast {
  position:fixed; bottom:24px; right:24px; background:var(--navy); color:var(--white);
  padding:10px 18px; border-radius:8px; font-size:12px; font-weight:500;
  box-shadow:var(--shadow-lg); z-index:9999; transform:translateY(80px); opacity:0;
  transition:all .25s; pointer-events:none;
}
.toast.show { transform:translateY(0); opacity:1; }
.toast.toast-alert { background:var(--red); }
.toast.toast-ok { background:var(--green); }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--gray-300); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--gray-400); }

.filter-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.filter-row label { font-size:11px; color:var(--gray-600); font-weight:500; }
.filter-row select { width:auto; }
.search-input { width:180px; }

.section-divider { height:16px; }
.onestep-info { background:var(--teal-light); border:1px solid var(--teal-mid); border-radius:6px; padding:8px 12px; font-size:11px; color:var(--teal); margin-bottom:12px; }
.onestep-info strong { font-weight:700; }

/* ── PRINT STYLES ── */
@media print {
  html, body { overflow:visible!important; height:auto!important; }
  .app { display:block!important; height:auto!important; }
  .topbar, #tabsBar, .sheet-toolbar, .no-print { display:none!important; }
  .main { display:block!important; }
  .sheet-content { overflow:visible!important; padding:0!important; }
  #printArea { max-width:100%!important; }
  body { font-size:11px; }
  @page { margin: 15mm 12mm; size: A4; }
}
</style>
</head>

// Today's schedule: patients visiting today (木曜)
function getTodayPatients() {
  const day = TODAY_DAY;
  const am = MASTER.filter(p=>p[day]==='AM');
  const pm = MASTER.filter(p=>p[day]==='PM');
  return {am,pm};
}

// Get latest vital for patient (today)
function getLatestVital(pid) {
  const recs = RECORDS[pid]||[];
  const today = recs.filter(r=>r.date===TODAY_DATE_STR);
  return today[today.length-1]||null;
}

function isAlert(sbp,dbp) { return (sbp&&sbp>=180)||(dbp&&dbp>=100); }

function showToast(msg,type='') {
  const el=document.getElementById('toast');

  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3000);
}

function judgeBadge(sbp,dbp) {
  if(!sbp&&!dbp) return '<span class="badge badge-pending">―</span>';
  if(isAlert(sbp,dbp)) return '<span class="badge badge-alert">⚠ 要報告</span>';
  return '<span class="badge badge-ok">正常</span>';
}
function statusBadge(val) {
  if(!val) return '<span class="badge badge-pending">⚠ 未</span>';
  return '<span class="badge badge-done">✓ 済</span>';
}

// Update vital in store and sync
function updateVital(pid, field, val) {
  const numFields=['entSBP','entDBP','entPulse','reSBP','reDBP','rePulse','exitSBP','exitDBP','exitPulse','re2SBP','re2DBP','re2Pulse'];
  if(!RECORDS[pid]) RECORDS[pid]=[{date:TODAY_DATE_STR,ampm:'',entSBP:'',entDBP:'',entPulse:'',entJudge:'',reSBP:'',reDBP:'',rePulse:'',reJudge:'',exitSBP:'',exitDBP:'',exitPulse:'',exitJudge:'',re2SBP:'',re2DBP:'',re2Pulse:'',re2Judge:'',recorder:'',note:'',special:''}];
  const rec = RECORDS[pid].find(r=>r.date===TODAY_DATE_STR) || RECORDS[pid][0];
  rec[field] = numFields.includes(field) ? (val===''?'':Number(val)) : val;

  // Check alert
  if(isAlert(rec.entSBP,rec.entDBP)||isAlert(rec.exitSBP,rec.exitDBP)){
    showToast(`⚠ ${MASTER.find(p=>p.id===pid)?.name} — アラート値を検出！`,　'alert');
    document.getElementById('alertBanner').style.display='';
  }
  // Refresh judgments in DOM without full re-render
  ['am','pm'].forEach(g=>{
    const sid=`${g}_${pid}`;
    const ej=document.getElementById(`ej_${sid}`);
    const rj=document.getElementById(`rj_${sid}`);
    const xj=document.getElementById(`xj_${sid}`);
    if(ej) ej.innerHTML=judgeBadge(rec.entSBP,rec.entDBP);
    if(rj) rj.innerHTML=judgeBadge(rec.reSBP,rec.reDBP);
    if(xj) xj.innerHTML=judgeBadge(rec.exitSBP,rec.exitDBP);
    // Alert styling on inputs
    const esbpEl=document.getElementById(`esbp_${sid}`);
    const edbpEl=document.getElementById(`edbp_${sid}`);
    if(esbpEl){esbpEl.className='bp-input'+(rec.entSBP>=180?' bp-alert':'');}
    if(edbpEl){edbpEl.className='bp-input'+(rec.entDBP>=100?' bp-alert':'');}
  });
}
function updateNote(pid,val){
  if(!RECORDS[pid]) RECORDS[pid]=[{date:TODAY_DATE_STR,ampm:'',entSBP:'',entDBP:'',entPulse:'',entJudge:'',reSBP:'',reDBP:'',rePulse:'',reJudge:'',exitSBP:'',exitDBP:'',exitPulse:'',exitJudge:'',re2SBP:'',re2DBP:'',re2Pulse:'',re2Judge:'',recorder:'',note:'',special:''}];
  const rec=RECORDS[pid].find(r=>r.date===TODAY_DATE_STR)||RECORDS[pid][0];
  rec.note=val;
}

function renderCheck() {
  const {am,pm}=getTodayPatients();
  const totalAM=am.length, totalPM=pm.length;
  let measAM=0,alertCt=0;
  am.forEach(p=>{const r=getLatestVital(p.id);if(r&&r.entSBP)measAM++;if(r&&isAlert(r.entSBP,r.entDBP))alertCt++;});
  pm.forEach(p=>{const r=getLatestVital(p.id);if(r&&r.entSBP)_;if(r&&isAlert(r.entSBP,r.entDBP))alertCt++;});

  const row=(p,i)=>{
    const rec=getLatestVital(p.id);
    const entDone=rec&&rec.entSBP?'done':'';
    const reDone=rec&&rec.reSBP?'done':'';
    const exitDone=rec&&rec.exitSBP?'done':'';
    const re2Done=rec&&rec.re2SBP?'done':'';

function renderSchedule() {
  const days=['月','火','水','木','金'];
  const dayColors=['#1A5276','#1F618D','#2471A3','#2980B9','#3498DB'];
  const seqMax=10;

  let headerRow='<tr><th style="background:var(--navy)">順</th>';
  days.forEach((d,i)=>{
    headerRow+=`<th colspan="2" style="background:${dayColors[i]}">${d}曜日</th>`;
  });
  headerRow+='</tr>';

  let subRow='<tr><th style="background:var(--navy)"></th>';
  days.forEach((_,i)=>{
    subRow+=`<th style="background:${dayColors[i]};opacity:.85;font-size:10px">午前 AM</th><th style="background:${dayColors[i]};opacity:.75;font-size:10px">午後 PM</th>`;
  });
  subRow+='</tr>';

  let rows='';
  for(let seq=1;seq<=seqMax;seq++){
    let tr=`<tr><td style="background:var(--navy);color:white;font-weight:700;text-align:center">${seq}</td>`;
    days.forEach(d=>{
      const am=MASTER.filter(p=>p[d]==='AM')[seq-1];
      const pm=MASTER.filter(p=>p[d]==='PM')[seq-1];
      tr+=`<td style="background:#ebf5fb;text-align:center;font-size:12px">${am?am.name:'<span style="color:#ccc">―</span>'}</td>`;
      tr+=`<td style="background:#f9ebf8;text-align:center;font-size:12px">${pm?pm.name:'<span style="color:#ccc">―</span>'}</td>`;
    });
    tr+='</tr>';
    rows+=tr;
  }

  let totalRow='<tr><td style="background:var(--teal);color:white;font-weight:700;text-align:center">計</td>';
  days.forEach(d=>{
    const amCt=MASTER.filter(p=>p[d]==='AM').length;
    const pmCt=MASTER.filter(p=>p[d]==='PM').length;
    totalRow+=`<td style="background:var(--teal-light);color:var(--teal);font-weight:700;text-align:center">${amCt}名</td>`;
    totalRow+=`<td style="background:var(--purple-light);color:var(--purple);font-weight:700;text-align:center">${pmCt}名</td>`;
  });
  totalRow+='</tr>';

  return `
  <div style="margin-bottom:12px;font-size:11px;color:var(--gray-500)">
    利用者マスタの曜日設定から自動生成。変更は「マスタデータ」シートで行ってください。
    <span class="badge badge-am" style="margin-left:8px">AM 午前</span>
    <span class="badge badge-pm" style="margin-left:4px">PM 午後</span>
  </div>
  <div class="tbl-wrap">
    <table>
      <thead>${headerRow}${subRow}</thead>
      <tbody>${rows}${totalRow}</tbody>
    </table>
  </div>`;
}

let masterFilter = '';
let masterEditId = null; // currently editing row id, null = none

function masterNextId() {
  const ids = MASTER.map(p=>parseInt(p.id.replace(/\D/g,''))).filter(n=>!isNaN(n));
  const max = ids.length ? Math.max(...ids) : 0;
  return 'P' + String(max + 1).padStart(3, '0');
}

function masterSave(id) {
  const p = MASTER.find(x=>x.id===id);
  if(!p) return;
  const g = f => { const el=document.getElementById(`mf_${id}_${f}`); return el?el.value.trim():''; };
  p.name    = g('name');
  p.kana    = g('kana');
  p.dob     = g('dob');
  p.sex     = g('sex');
  p.disease = g('disease');
  p.medicine= g('medicine');
  ['月','火','水','木','金'].forEach(d=>{ p[d]=g(d); });
  p.note    = g('note');
  masterEditId = null;
  renderSheet('master');
  showToast(`✅ ${p.name} を保存しました`, 'ok');
}

function masterCancel() {
  masterEditId = null;
  renderSheet('master');
}

function masterDelete(id) {
  const p = MASTER.find(x=>x.id===id);
  if(!p) return;
  if(!confirm(`「${p.name}」を削除しますか？\nこの操作は元に戻せません。`)) return;
  const idx = MASTER.indexOf(p);
  MASTER.splice(idx, 1);
  masterEditId = null;
  renderSheet('master');
  showToast(`🗑 ${p.name} を削除しました`);
}

function masterAddRow() {
  const newId = masterNextId();
  MASTER.push({id:newId,name:'',kana:'',dob:'',sex:'男',disease:'',medicine:'',月:'',火:'',水:'',木:'',金:'',note:''});

  renderSheet('master');

  setTimeout(()=>{ const el=document.querySelector(`#mrow_${newId}`); if(el) el.scrollIntoView({behavior:'smooth',block:'center'}); }, 80);
}

let personalPid='P061';
let personalMonth=TODAY_MONTH_STR;

function renderPersonal() {
  const p = MASTER.find(x=>x.id===personalPid) || MASTER[0];
  const allRecs = (RECORDS[p.id]||[]);
  const monthRecs = allRecs.filter(r=> r.date && r.date.startsWith(personalMonth));
  const sorted = [...monthRecs].sort((a,b)=>a.date.localeCompare(b.date));

  const withSBP = sorted.filter(r=>r.entSBP);
  const avgSBP = withSBP.length ? Math.round(withSBP.reduce((s,r)=>s+r.entSBP,0)/withSBP.length) : null;
  const avgDBP = withSBP.length ? Math.round(withSBP.reduce((s,r)=>s+r.entDBP,0)/withSBP.length) : null;
  const maxSBP = withSBP.length ? Math.max(...withSBP.map(r=>r.entSBP)) : null;
  const minSBP = withSBP.length ? Math.min(...withSBP.map(r=>r.entSBP)) : null;

  // 直近6ヶ月を動的生成
  const months = [];
  for(let i=0;i<6;i++){
    const d = new Date(TODAY.getFullYear(), TODAY.getMonth()-i, 1);
    months.push(dateToMonth(d));
  }

  // ── Large SVG chart (full width, tall) ──
  function buildChart(){
    if(withSBP.length < 1) return '<div style="text-align:center;padding:40px 0;color:#bbb;font-size:13px">この月の測定記録がありません</div>';
    const W=680, H=200, PL=44, PR=16, PT=16, PB=32;
    const cW=W-PL-PR, cH=H-PT-PB;
    const n=withSBP.length;
    const YMIN=60, YMAX=210;
    const xPos = i => n===1 ? PL+cW/2 : PL + (i/(n-1))*cW;
    const yPos = v => PT + cH - ((v-YMIN)/(YMAX-YMIN))*cH;

    // alert zone fill
    const alertY = yPos(180);

    // SBP polyline
    const sbpPts = withSBP.map((r,i)=>`${xPos(i).toFixed(1)},${yPos(r.entSBP).toFixed(1)}`).join(' ');
    // DBP polyline
    const dbpPts = withSBP.map((r,i)=>`${xPos(i).toFixed(1)},${yPos(r.entDBP).toFixed(1)}`).join(' ');
    // area fill under SBP
    const areaFirst=`${xPos(0).toFixed(1)},${(PT+cH).toFixed(1)}`;
    const areaLast=`${xPos(n-1).toFixed(1)},${(PT+cH).toFixed(1)}`;
    const areaPath=`${areaFirst} ${sbpPts} ${areaLast}`;

    // Y axis labels
    const yTicks=[80,100,120,140,160,180,200];
    const yLines = yTicks.map(v=>{
      const y=yPos(v);
      const isAlert=v===180;
      return `<line x1="${PL}" y1="${y.toFixed(1)}" x2="${W-PR}" y2="${y.toFixed(1)}"
        stroke="${isAlert?'#e74c3c':'#e8ecef'}" stroke-width="${isAlert?'1.5':'1'}"
        stroke-dasharray="${isAlert?'4,3':''}"/>
      <text x="${(PL-4).toFixed(1)}" y="${(y+3.5).toFixed(1)}" text-anchor="end"
        font-size="9" fill="${isAlert?'#e74c3c':'#aaa'}" font-family="monospace">${v}</text>`;
    }).join('');

    // X axis labels (dates, show every n-th)
    const step = Math.max(1, Math.ceil(n/10));
    const xLabels = withSBP.map((r,i)=>{
      if(i%step!==0 && i!==n-1) return '';
      const parts=r.date.split('/');
      const lbl=parts.length===3?`${parts[1]}/${parts[2]}`:r.date;
      return `<text x="${xPos(i).toFixed(1)}" y="${(H-6).toFixed(1)}" text-anchor="middle"
        font-size="8.5" fill="#888" font-family="monospace">${lbl}</text>`;
    }).join('');

    // Dots + value labels for SBP
    const sbpDots = withSBP.map((r,i)=>{
      const x=xPos(i), y=yPos(r.entSBP);
      const alert=r.entSBP>=180||r.entDBP>=100;
      const showLabel = n<=12;
      return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${alert?5:4}"
        fill="${alert?'#e74c3c':'#0d7a8a'}" stroke="white" stroke-width="1.5"/>
        ${showLabel?`<text x="${x.toFixed(1)}" y="${(y-8).toFixed(1)}" text-anchor="middle"
          font-size="9" font-weight="700" fill="${alert?'#e74c3c':'#0d7a8a'}"
          font-family="monospace">${r.entSBP}</text>`:''}`;
    }).join('');

    const dbpDots = withSBP.map((r,i)=>{
      const x=xPos(i), y=yPos(r.entDBP);
      const showLabel = n<=12;
      return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3"
        fill="#27ae60" stroke="white" stroke-width="1.5"/>
        ${showLabel?`<text x="${x.toFixed(1)}" y="${(y+16).toFixed(1)}" text-anchor="middle"
          font-size="8.5" fill="#27ae60" font-family="monospace">${r.entDBP}</text>`:''}`;
    }).join('');

    return `<svg width="100%" viewBox="0 0 ${W} ${H}" style="display:block;overflow:visible">
      <defs>
        <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#0d7a8a" stop-opacity="0.12"/>
          <stop offset="100%" stop-color="#0d7a8a" stop-opacity="0.01"/>
        </linearGradient>
      </defs>
      <!-- alert zone -->
      <rect x="${PL}" y="${PT}" width="${cW}" height="${Math.max(0,alertY-PT).toFixed(1)}"
        fill="#e74c3c" fill-opacity="0.04"/>
      <!-- grid -->
      ${yLines}
      <!-- area -->
      ${n>1?`<polygon points="${areaPath}" fill="url(#areaGrad)"/>`:''}
      <!-- DBP line -->
      ${n>1?`<polyline fill="none" stroke="#27ae60" stroke-width="1.5" stroke-linejoin="round" stroke-dasharray="5,3" points="${dbpPts}"/>`:''}
      <!-- SBP line -->
      ${n>1?`<polyline fill="none" stroke="#0d7a8a" stroke-width="2.5" stroke-linejoin="round" points="${sbpPts}"/>`:''}
      <!-- dots -->
      ${dbpDots}
      ${sbpDots}
      <!-- x labels -->
      ${xLabels}
      <!-- alert label -->
      <text x="${(W-PR+2).toFixed(1)}" y="${(alertY-2).toFixed(1)}" font-size="8.5" fill="#e74c3c" font-family="monospace">180</text>
    </svg>`;
  }

  // ── Table rows ──
  const tableRows = sorted.reverse().map((r,i)=>{
    const alert = isAlert(r.entSBP,r.entDBP)||isAlert(r.exitSBP,r.exitDBP);
    const dp = r.date ? r.date.split('/').slice(1).join('/') : '―';
    return `<tr style="${alert?'background:#fce8e6':i%2?'background:#f8fafc':''}">
      <td style="font-family:monospace;font-size:12px;padding:7px 10px;border-bottom:1px solid #eee;white-space:nowrap">${dp}</td>
      <td style="font-size:11px;padding:7px 8px;border-bottom:1px solid #eee;text-align:center">${r.ampm||'―'}</td>
      <td style="font-family:monospace;font-size:14px;font-weight:700;padding:7px 10px;border-bottom:1px solid #eee;text-align:center;color:${r.entSBP>=180?'#e74c3c':'#0f2744'}">${r.entSBP||'―'}</td>
      <td style="font-family:monospace;font-size:14px;font-weight:700;padding:7px 10px;border-bottom:1px solid #eee;text-align:center;color:${r.entDBP>=100?'#e74c3c':'#0f2744'}">${r.entDBP||'―'}</td>
      <td style="font-family:monospace;font-size:13px;padding:7px 10px;border-bottom:1px solid #eee;text-align:center;color:#555">${r.entPulse||'―'}</td>
      <td style="font-family:monospace;font-size:14px;font-weight:700;padding:7px 10px;border-bottom:1px solid #eee;text-align:center;color:${r.exitSBP>=180?'#e74c3c':'#27ae60'}">${r.exitSBP||'―'}</td>
      <td style="font-family:monospace;font-size:14px;font-weight:700;padding:7px 10px;border-bottom:1px solid #eee;text-align:center;color:${r.exitDBP>=100?'#e74c3c':'#27ae60'}">${r.exitDBP||'―'}</td>
      <td style="font-family:monospace;font-size:13px;padding:7px 10px;border-bottom:1px solid #eee;text-align:center;color:#555">${r.exitPulse||'―'}</td>
      <td style="font-size:11px;padding:7px 8px;border-bottom:1px solid #eee;color:${alert?'#e74c3c':'#555'};font-weight:${alert?700:400}">${alert?'⚠ 要報告':''}</td>
    </tr>`;
  }).join('') || `<tr><td colspan="9" style="text-align:center;padding:24px;color:#ccc;font-size:12px">この月の記録はありません</td></tr>`;

  return `
  <!-- controls: hidden on print -->
  <div class="no-print" style="display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap">
    <select onchange="personalPid=this.value;renderSheet('personal')" style="font-size:12px;min-width:180px">
      ${MASTER.map(x=>`<option value="${x.id}" ${x.id===p.id?'selected':''}>${x.id}　${x.name}</option>`).join('')}
    </select>
    <select onchange="personalMonth=this.value;renderSheet('personal')" style="font-size:12px;width:110px">
      ${months.map(m=>{const[y,mo]=m.split('/');return`<option value="${m}" ${m===personalMonth?'selected':''}>${y}年${mo}月</option>`;}).join('')}
    </select>
    <button class="btn btn-primary" onclick="window.print()" style="margin-left:auto;padding:7px 18px;font-size:13px">🖨️ 印刷</button>
  </div>

  <!-- ═══ PRINT AREA ═══ -->
  <div id="printArea" style="background:#fff;max-width:740px;margin:0 auto;padding:0 2px">

    <!-- Name header -->
    <div style="display:flex;justify-content:space-between;align-items:flex-end;border-bottom:3px solid #0f2744;padding-bottom:8px;margin-bottom:18px">
      <div>
        <div style="font-size:11px;color:#999;margin-bottom:2px">バイタル記録　${personalMonth.replace('/','年')}月</div>
        <div style="font-size:28px;font-weight:900;color:#0f2744;letter-spacing:-0.5px">${p.name}<span style="font-size:14px;font-weight:400;color:#aaa;margin-left:8px">${p.kana}</span></div>
      </div>
      <div style="text-align:right;font-size:11px;color:#aaa;line-height:1.8">
        <div>発行：${TODAY.getFullYear()}/${String(TODAY.getMonth()+1).padStart(2,'0')}/${String(TODAY.getDate()).padStart(2,'0')}</div>
        <div style="color:#e74c3c;font-size:10px">⚠ 要報告基準　SBP ≥ 180 / DBP ≥ 100</div>
      </div>
    </div>

    <!-- Stats strip -->
    <div style="display:flex;gap:0;margin-bottom:18px;border:1px solid #e8ecef;border-radius:8px;overflow:hidden">
      ${[
        ['測定', withSBP.length+'回', '#475569'],
        ['平均', avgSBP ? avgSBP+'\u2009/\u2009'+avgDBP : '―', '#0d7a8a'],
        ['最高', maxSBP ? maxSBP+' mmHg' : '―', maxSBP>=180?'#e74c3c':'#475569'],
        ['最低', minSBP ? minSBP+' mmHg' : '―', '#475569'],
      ].map(([lbl,val,col],i)=>`
        <div style="flex:1;padding:10px 0;text-align:center;${i?'border-left:1px solid #e8ecef':''}">
          <div style="font-size:9px;color:#aaa;font-weight:700;letter-spacing:.5px;margin-bottom:3px">${lbl}</div>
          <div style="font-size:17px;font-weight:800;color:${col};font-family:monospace">${val}</div>
        </div>`).join('')}
    </div>

    <!-- Chart -->
    <div style="margin-bottom:20px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-size:10px;font-weight:700;color:#555;letter-spacing:.3px">血圧グラフ（収縮期 / 拡張期）</span>
        <span style="display:flex;gap:14px;font-size:9.5px;color:#888">
          <span style="display:flex;align-items:center;gap:4px"><svg width="16" height="4"><line x1="0" y1="2" x2="16" y2="2" stroke="#0d7a8a" stroke-width="2.5"/></svg>収縮期 SBP</span>
          <span style="display:flex;align-items:center;gap:4px"><svg width="16" height="4"><line x1="0" y1="2" x2="16" y2="2" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="4,2"/></svg>拡張期 DBP</span>
          <span style="display:flex;align-items:center;gap:4px"><svg width="16" height="4"><line x1="0" y1="2" x2="16" y2="2" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="3,2"/></svg>要報告ライン(180)</span>
        </span>
      </div>
      ${buildChart()}
    </div>

    <!-- Table -->
    <table style="width:100%;border-collapse:collapse;font-family:'Noto Sans JP',sans-serif">
      <thead>
        <tr>
          <th colspan="5" style="background:#0d7a8a;color:#fff;font-size:10px;font-weight:700;padding:6px 10px;text-align:left;letter-spacing:.3px">入館時測定</th>
          <th colspan="3" style="background:#27ae60;color:#fff;font-size:10px;font-weight:700;padding:6px 10px;text-align:left;letter-spacing:.3px">帰宅時測定</th>
          <th style="background:#334155;color:#fff;font-size:10px;padding:6px 8px"></th>
        </tr>
        <tr style="background:#f4f6f8">
          <th style="padding:5px 10px;font-size:10px;color:#666;font-weight:600;text-align:left;border-bottom:2px solid #ddd">日付</th>
          <th style="padding:5px 8px;font-size:10px;color:#666;font-weight:600;text-align:center;border-bottom:2px solid #ddd">区分</th>
          <th style="padding:5px 10px;font-size:10px;color:#0d7a8a;font-weight:700;text-align:center;border-bottom:2px solid #ddd">収縮期</th>
          <th style="padding:5px 10px;font-size:10px;color:#0d7a8a;font-weight:700;text-align:center;border-bottom:2px solid #ddd">拡張期</th>
          <th style="padding:5px 10px;font-size:10px;color:#666;font-weight:600;text-align:center;border-bottom:2px solid #ddd">脈拍</th>
          <th style="padding:5px 10px;font-size:10px;color:#27ae60;font-weight:700;text-align:center;border-bottom:2px solid #ddd">収縮期</th>
          <th style="padding:5px 10px;font-size:10px;color:#27ae60;font-weight:700;text-align:center;border-bottom:2px solid #ddd">拡張期</th>
          <th style="padding:5px 10px;font-size:10px;color:#666;font-weight:600;text-align:center;border-bottom:2px solid #ddd">脈拍</th>
          <th style="padding:5px 8px;font-size:10px;color:#e74c3c;font-weight:600;text-align:center;border-bottom:2px solid #ddd">判定</th>
        </tr>
      </thead>
      <tbody>${tableRows}</tbody>
    </table>

    <!-- footer -->
    <div style="margin-top:14px;padding-top:8px;border-top:1px solid #eee;display:flex;justify-content:space-between;font-size:9.5px;color:#bbb">
      <span>通所介護施設 半日スポーツデイサービス　個人バイタル記録票</span>
      <span>⚠ 収縮期 ≥ 180 または 拡張期 ≥ 100 mmHg のとき要報告</span>
    </div>

  </div>`;
}

//  SHEET: DATA
// ═══════════════════════════════════════════
let dataFilter='';
let dataFilterAlertOnly=false;
let dataFilterAmpm='';

function execDataSearch() {
  dataFilter = document.getElementById('dataSearchInput').value.trim();
  dataFilterAlertOnly = document.getElementById('dataAlertOnly').checked;
  dataFilterAmpm = document.getElementById('dataAmpmFilter').value;
  renderSheet('data');
}

function bpCell(val, threshold) {
  const over = val && val >= threshold;
  return `<td style="
    font-family:monospace;font-size:14px;font-weight:700;
    text-align:center;padding:8px 10px;
    border-bottom:1px solid #f0f0f0;
    color:${over ? '#c0392b' : '#0f2744'};
    background:${over ? '#fce8e6' : 'transparent'};
  ">${val || '<span style="color:#ccc;font-size:12px;font-weight:400">—</span>'}</td>`;
}

function pulseCell(val) {
  return `<td style="
    font-family:monospace;font-size:13px;text-align:center;
    padding:8px 10px;border-bottom:1px solid #f0f0f0;color:#555;
  ">${val || '<span style="color:#ccc;font-size:12px">—</span>'}</td>`;
}

function renderData() {
  const allRecs=[];
  Object.entries(RECORDS).forEach(([pid,recs])=>{
    const p=MASTER.find(x=>x.id===pid);
    recs.forEach(r=>allRecs.push({...r,pid,pname:p?p.name:'不明'}));
  });
  allRecs.sort((a,b)=>b.date.localeCompare(a.date));
  const filtered=allRecs.filter(r=>{
    if(dataFilter && !r.pname.includes(dataFilter) && !r.pid.includes(dataFilter) && !(r.special||'').includes(dataFilter) && !(r.note||'').includes(dataFilter)) return false;
    if(dataFilterAlertOnly && !isAlert(r.entSBP,r.entDBP) && !isAlert(r.exitSBP,r.exitDBP)) return false;
    if(dataFilterAmpm && r.ampm!==dataFilterAmpm) return false;
    return true;
  });

  const alertCount = filtered.filter(r=>isAlert(r.entSBP,r.entDBP)||isAlert(r.exitSBP,r.exitDBP)).length;

  const rows = filtered.length ? filtered.map((r,i)=>{
    const rowAlert = isAlert(r.entSBP,r.entDBP)||isAlert(r.exitSBP,r.exitDBP);
    const hasNote = r.special||r.note;
    return `<tr style="background:${rowAlert ? '#fff5f5' : i%2===0 ? '#fff' : '#fafbfc'}">
      <td style="padding:8px 10px;border-bottom:1px solid #f0f0f0;white-space:nowrap">
        <span style="font-family:monospace;font-size:12px;color:#555">${r.date||'―'}</span>
      </td>
      <td style="padding:8px 8px;border-bottom:1px solid #f0f0f0;text-align:center">
        ${r.ampm ? `<span style="display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;
          background:${r.ampm==='AM'?'#fef3e2':'#f3e9f8'};color:${r.ampm==='AM'?'#e67e22':'#6c3483'}">${r.ampm}</span>` : ''}
      </td>
      <td style="padding:8px 10px;border-bottom:1px solid #f0f0f0">
        <a href="#" onclick="goPersonal('${r.pid}');return false"
          style="font-size:13px;font-weight:600;color:#0d7a8a;text-decoration:none;white-space:nowrap">${r.pname}</a>
      </td>
      <!-- 入館時 -->
      <td style="padding:0;border-bottom:1px solid #f0f0f0;border-left:3px solid #0d7a8a">
        <div style="display:flex;align-items:center;gap:0">
          <span style="font-family:monospace;font-size:16px;font-weight:800;padding:8px 6px 8px 10px;
            color:${r.entSBP>=180?'#c0392b':'#0f2744'};background:${r.entSBP>=180?'#fce8e6':'transparent'}">${r.entSBP||'<span style="color:#ccc;font-size:13px;font-weight:400">—</span>'}</span>
          <span style="font-size:11px;color:#aaa;padding:0 2px">/</span>
          <span style="font-family:monospace;font-size:16px;font-weight:800;padding:8px 10px 8px 4px;
            color:${r.entDBP>=100?'#c0392b':'#0f2744'};background:${r.entDBP>=100?'#fce8e6':'transparent'}">${r.entDBP||'<span style="color:#ccc;font-size:13px;font-weight:400">—</span>'}</span>
        </div>
      </td>
      ${pulseCell(r.entPulse)}
      <!-- 帰宅時 -->
      <td style="padding:0;border-bottom:1px solid #f0f0f0;border-left:3px solid #1e8449">
        <div style="display:flex;align-items:center;gap:0">
          <span style="font-family:monospace;font-size:16px;font-weight:800;padding:8px 6px 8px 10px;
            color:${r.exitSBP>=180?'#c0392b':'#1e8449'};background:${r.exitSBP>=180?'#fce8e6':'transparent'}">${r.exitSBP||'<span style="color:#ccc;font-size:13px;font-weight:400">—</span>'}</span>
          <span style="font-size:11px;color:#aaa;padding:0 2px">/</span>
          <span style="font-family:monospace;font-size:16px;font-weight:800;padding:8px 10px 8px 4px;
            color:${r.exitDBP>=100?'#c0392b':'#1e8449'};background:${r.exitDBP>=100?'#fce8e6':'transparent'}">${r.exitDBP||'<span style="color:#ccc;font-size:13px;font-weight:400">—</span>'}</span>
        </div>
      </td>
      ${pulseCell(r.exitPulse)}
      <!-- 再測定 (compact) -->
      <td style="padding:8px 10px;border-bottom:1px solid #f0f0f0;border-left:2px solid #8e44ad">
        ${r.reSBP ? `<span style="font-family:monospace;font-size:13px;font-weight:600;color:#8e44ad">${r.reSBP}/${r.reDBP}</span>` : '<span style="color:#ddd;font-size:11px">―</span>'}
      </td>
      <!-- 判定 -->
      <td style="padding:8px 10px;border-bottom:1px solid #f0f0f0;text-align:center;white-space:nowrap">
        ${rowAlert
          ? `<span style="display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:12px;font-size:10px;font-weight:700;background:#fce8e6;color:#c0392b">⚠ 要報告</span>`
          : (r.entSBP ? `<span style="display:inline-block;padding:3px 8px;border-radius:12px;font-size:10px;background:#e8f5e9;color:#1e8449;font-weight:600">正常</span>` : '')}
      </td>
      <!-- 特記 -->
      <td style="padding:8px 10px;border-bottom:1px solid #f0f0f0;font-size:11px;color:#666;max-width:160px">
        ${hasNote ? `<span style="display:inline-block;max-width:150px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${hasNote}">${hasNote}</span>` : ''}
      </td>
    </tr>`;
  }).join('') : `<tr><td colspan="10" style="text-align:center;padding:40px;color:#ccc;font-size:13px">
    記録データなし — ワンステップで入力すると即時反映されます
  </td></tr>`;

  return `
  <!-- search bar -->
  <div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:12px 14px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)">
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <input id="dataSearchInput" type="text" placeholder="氏名・ID・特記事項で検索..."
        value="${dataFilter}" onkeydown="if(event.key==='Enter')execDataSearch()"
        style="width:210px;font-size:12px">
      <select id="dataAmpmFilter" style="width:88px;font-size:12px">
        <option value="" ${dataFilterAmpm===''?'selected':''}>全時間帯</option>
        <option value="AM" ${dataFilterAmpm==='AM'?'selected':''}>☀ AM</option>
        <option value="PM" ${dataFilterAmpm==='PM'?'selected':''}>🌙 PM</option>
      </select>
      <label style="display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer;white-space:nowrap">
        <input id="dataAlertOnly" type="checkbox" ${dataFilterAlertOnly?'checked':''} style="width:auto">
        <span style="color:#c0392b;font-weight:600">⚠ アラートのみ</span>
      </label>
      <button class="btn btn-primary" onclick="execDataSearch()">検索</button>
      <button class="btn btn-secondary" onclick="dataFilter='';dataFilterAlertOnly=false;dataFilterAmpm='';renderSheet('data')">リセット</button>
      <span style="font-size:11px;color:#94a3b8;font-family:monospace;margin-left:4px">${filtered.length}件</span>
      ${alertCount ? `<span style="font-size:11px;font-weight:700;color:#c0392b;background:#fce8e6;padding:2px 8px;border-radius:10px">⚠ ${alertCount}件 要報告</span>` : ''}
    </div>
    <div style="margin-top:6px;font-size:10px;color:#bbb">Enterキーまたは「検索」ボタンで実行</div>
  </div>

  <!-- table -->
  <div style="border:1px solid #e2e8f0;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)">
    <table style="width:100%;border-collapse:collapse;min-width:700px">
      <thead>
        <tr style="background:#0f2744">
          <th style="padding:10px 10px;color:#fff;font-size:10px;font-weight:600;text-align:left;white-space:nowrap;border-right:1px solid rgba(255,255,255,.1)">実施日</th>
          <th style="padding:10px 8px;color:#fff;font-size:10px;font-weight:600;text-align:center;border-right:1px solid rgba(255,255,255,.1)">区分</th>
          <th style="padding:10px 10px;color:#fff;font-size:10px;font-weight:600;text-align:left;border-right:1px solid rgba(255,255,255,.1)">氏名</th>
          <th style="padding:10px 10px;color:#b2e4ea;font-size:10px;font-weight:700;text-align:center;border-left:3px solid #0d7a8a;border-right:1px solid rgba(255,255,255,.1)">入館時　SBP / DBP</th>
          <th style="padding:10px 8px;color:#b2e4ea;font-size:10px;font-weight:600;text-align:center;border-right:1px solid rgba(255,255,255,.1)">脈拍</th>
          <th style="padding:10px 10px;color:#a9dfbf;font-size:10px;font-weight:700;text-align:center;border-left:3px solid #1e8449;border-right:1px solid rgba(255,255,255,.1)">帰宅時　SBP / DBP</th>
          <th style="padding:10px 8px;color:#a9dfbf;font-size:10px;font-weight:600;text-align:center;border-right:1px solid rgba(255,255,255,.1)">脈拍</th>
          <th style="padding:10px 10px;color:#d2b4de;font-size:10px;font-weight:600;text-align:center;border-left:2px solid #8e44ad;border-right:1px solid rgba(255,255,255,.1)">再測定</th>
          <th style="padding:10px 8px;color:#fff;font-size:10px;font-weight:600;text-align:center;border-right:1px solid rgba(255,255,255,.1)">判定</th>
          <th style="padding:10px 10px;color:#fff;font-size:10px;font-weight:600;text-align:left">特記・申送り</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

//  RENDER DISPATCHER
// ═══════════════════════════════════════════
const getToolbarInfo = () => ({
  onestep:  {title:'⚡ ワンステップ入力', info:TODAY_STR},
  check:    {title:'✅ 未測定者チェック', info:TODAY_STR},
  schedule: {title:'📅 曜日別スケジュール', info:'月〜金 / 午前・午後グループ一覧'},
  master:   {title:'👥 マスタデータ', info:`利用者 ${MASTER.length} 名登録`},
  personal: {title:'📊 個人記録参照', info:`${personalMonth.replace('/','年')}月 | 患者を選択`},
  data:     {title:'🗄 記録データベース', info:'全バイタル測定記録'},
});

function renderSheet(id) {
  const ti=getToolbarInfo()[id];
  const content=document.getElementById('sheetContent');
  const bar=document.querySelector('.main')||document.createElement('div');

  // Rebuild toolbar
  const existing=document.querySelector('.sheet-toolbar');
  if(existing) existing.remove();
  const toolbar=document.createElement('div');
  toolbar.className='sheet-toolbar';
  toolbar.innerHTML=`<span class="toolbar-title">${ti.title}</span><div class="toolbar-divider"></div><span class="toolbar-info">${ti.info}</span>`;
  document.querySelector('.main').insertBefore(toolbar, content);

  let html='';
  if(id==='onestep') html=renderOnestep();
  else if(id==='check') html=renderCheck();
  else if(id==='schedule') html=renderSchedule();
  else if(id==='master') html=renderMaster();
  else if(id==='personal') html=renderPersonal();
  else if(id==='data') html=renderData();

  content.innerHTML=html;
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
renderTabs();
renderSheet(activeTab);
updateAlertBanner();
</script>
